services:

# -------- CADDY --------

  caddy:
    image: caddy:2.11.2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

# -------- AUTHELIA --------

  authelia:
    image: authelia/authelia:4.39
    container_name: authelia
    restart: unless-stopped
    volumes:
      - ./authelia:/config
    networks:
      - internal

# -------- PORTAINER --------

  portainer:
    image: portainer/portainer-ce:2.39.0
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - internal

# -------- WIREGUARD --------

  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - SERVERURL=auto
      - SERVERPORT=${WIREGUARD_PORT:-51820}
      - PEERS=${WIREGUARD_PEERS}
      - PEERDNS=auto
      - INTERNAL_SUBNET=${WIREGUARD_SUBNET:-10.0.0.0/24}
      - ALLOWEDIPS=${WIREGUARD_ALLOWEDIPS:-0.0.0.0/0}
    volumes:
      - ./wireguard:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WIREGUARD_PORT:-51820}:${WIREGUARD_PORT:-51820}/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - internal

# -------- GUACAMOLE --------

  postgres:
    image: postgres:16.9-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=guacamole_db
      - POSTGRES_USER=guacamole_user
      - POSTGRES_PASSWORD=guacamole_pass
    volumes:
      - guacamole_postgres_data:/var/lib/postgresql/data
      - ./guacamole/:/docker-entrypoint-initdb.d:ro
    networks:
      - internal

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard

  guacamole:
    image: guacamole/guacamole:1.6.0
    container_name: guacamole
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GUACD_HOSTNAME=wireguard
      - GUACD_PORT=4822
      - GUACAMOLE_HOME=/etc/guacamole
      - SERVER_PORT=8080
      - POSTGRESQL_HOSTNAME=postgres
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DATABASE=guacamole_db
      - POSTGRESQL_USERNAME=guacamole_user
      - POSTGRESQL_PASSWORD=guacamole_pass
      - HTTP_AUTH_HEADER=Remote-User
      - HTTP_AUTH_AUTO_CREATE_ACCOUNTS=true
      - QUICKCONNECT_ENABLED=false
      - BAN_ENABLED=true
    networks:
      - internal
    depends_on:
      - postgres
      - guacd

# -------- OPEN WEBUI --------

  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.9.2
    container_name: openwebui
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    environment:
      - HOST=0.0.0.0
      - PORT=${OPENWEBUI_PORT:-8081}
      - WEBUI_URL=https://${OPENWEBUI_DOMAIN}
      - ENABLE_LOGIN_FORM=False
      - ENABLE_SIGNUP=False
      - ENABLE_OPENAI_API=False
      - WEBUI_AUTH_TRUSTED_EMAIL_HEADER=Remote-Email
      - WEBUI_AUTH_TRUSTED_NAME_HEADER=Remote-Name
      - WEBUI_AUTH_TRUSTED_GROUPS_HEADER=Remote-Groups
      - OLLAMA_BASE_URL=http://${OLLAMA_WIREGUARD_IP}:${OLLAMA_WIREGUARD_PORT:-11434}
    volumes:
      - openwebui_data:/app/backend/data

# -------- SEARXNG --------

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    volumes:
      - searxng_cache:/var/cache/searxng
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_PORT=${SEARXNG_PORT:-8888}
      - SEARXNG_BASE_URL=https://searxng.${DOMAIN}/
    networks:
      - internal

# -------- COMFY UI --------

  comfyui:
    image: alpine/socat:1.8.0.3
    container_name: comfyui
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    command: TCP-LISTEN:${COMFYUI_PORT},fork,reuseaddr TCP:${COMFYUI_WIREGUARD_IP}:${COMFYUI_WIREGUARD_PORT}

# -------- ACE STEP --------

  acestep:
    image: alpine/socat:1.8.0.3
    container_name: acestep
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    command: TCP-LISTEN:${ACESTEP_PORT},fork,reuseaddr TCP:${ACESTEP_WIREGUARD_IP}:${ACESTEP_WIREGUARD_PORT}

# -------- OPENCLAW --------

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      - wireguard
    network_mode: "service:wireguard"
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN}
      - OLLAMA_HOST=http://${OLLAMA_WIREGUARD_IP}:${OLLAMA_WIREGUARD_PORT:-11434}
      - GATEWAY_TRUSTED_PROXIES=172.18.0.0/16
    volumes:
      - ./openclaw:/home/node/.openclaw
      - /etc/localtime:/etc/localtime:ro

# -------- FILE BROWSER --------

  filebrowser-vps:
    image: filebrowser/filebrowser:v2.44.0
    container_name: filebrowser-vps
    restart: unless-stopped
    environment:
      - FB_NOAUTH=true
      - FB_ROOT=/srv
      - FB_DATABASE=/tmp/database.db
      - FB_PORT=${FILEBROWSER_VPS_PORT:-8084}
    volumes:
      - ~/:/srv
      - filebrowser_config:/config
      - filebrowser_database:/database
    networks:
      - internal

  filebrowser-padre:
    image: alpine/socat:1.8.0.3
    container_name: filebrowser-padre
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    command: TCP-LISTEN:${FILEBROWSER_PC_PORT},fork,reuseaddr TCP:${FILEBROWSER_PC_WIREGUARD_IP}:${FILEBROWSER_PC_WIREGUARD_PORT}

  filebrowser-raspberry:
    image: alpine/socat:1.8.0.3
    container_name: filebrowser-raspberry
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    command: TCP-LISTEN:${FILEBROWSER_RPI_PORT},fork,reuseaddr TCP:${FILEBROWSER_RPI_WIREGUARD_IP}:${FILEBROWSER_RPI_WIREGUARD_PORT}

# -------- TORRENT --------

  torrent-padre:
    image: alpine/socat:1.8.0.3
    container_name: torrent-padre
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    command: TCP-LISTEN:${TORRENT_PC_PORT},fork,reuseaddr TCP:${TORRENT_PC_WIREGUARD_IP}:${TORRENT_PC_WIREGUARD_PORT}

  torrent-raspberry:
    image: alpine/socat:1.8.0.3
    container_name: torrent-raspberry
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    command: TCP-LISTEN:${TORRENT_RPI_PORT},fork,reuseaddr TCP:${TORRENT_RPI_WIREGUARD_IP}:${TORRENT_RPI_WIREGUARD_PORT}

# -------- FRONT --------

  front:
    container_name: front
    restart: unless-stopped
    build:
      context: ./dashboard/front
      dockerfile: Dockerfile
      args:
        - VITE_FILEBROWSER_PC_DOMAIN=${FILEBROWSER_PC_DOMAIN}
        - VITE_TORRENT_PC_DOMAIN=${TORRENT_PC_DOMAIN}
        - VITE_FILEBROWSER_RPI_DOMAIN=${FILEBROWSER_RPI_DOMAIN}
        - VITE_TORRENT_RPI_DOMAIN=${TORRENT_RPI_DOMAIN}
        - VITE_FILEBROWSER_VPS_DOMAIN=${FILEBROWSER_VPS_DOMAIN}
        - VITE_PORTAINER_DOMAIN=${PORTAINER_DOMAIN}
        - VITE_GUACAMOLE_DOMAIN=${GUACAMOLE_DOMAIN}
        - VITE_COMFYUI_DOMAIN=${COMFYUI_DOMAIN}
        - VITE_OPENWEBUI_DOMAIN=${OPENWEBUI_DOMAIN}
        - VITE_OPENCLAW_DOMAIN=${OPENCLAW_DOMAIN}
        - VITE_OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
    networks:
      - internal

# -------- API --------

  api:
    container_name: api
    restart: unless-stopped
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    build:
      context: ./dashboard/api
      dockerfile: Dockerfile
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - GUAC_URL=http://172.18.0.1:8080/guacamole
      - GUAC_PUBLIC_URL=https://${GUACAMOLE_DOMAIN}/guacamole
      - NODE_ENV=production
      - PORT=${API_PORT:-4000}
      - PC_IP=${API_PC_IP}
      - RPI_IP=${API_RPI_IP}
      - SSH_USER_PC=${API_PC_USER}
      - SSH_USER_RPI=${API_RPI_USER}
      - TELEMETRY_PC_PORT=${API_PC_TELEMETRY_PORT:-8000}
      - TELEMETRY_RPI_PORT=${API_RPI_TELEMETRY_PORT:-8000}

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  portainer_data:
  openwebui_data:
  searxng_cache:
  guacamole_postgres_data:
  filebrowser_config:
  filebrowser_database:
